<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Grid Planner - Instagram Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f5f5f5;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(88vw, 460px);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 22px;
        color: #a1a1aa;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: #f5f5f5;
        color: #09090b;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ritorno all'app</h1>
      <p>Se Photo Grid Planner non si apre automaticamente, usa il pulsante qui sotto.</p>
      <a id="open-app" href="photogridplanner://instagram-auth">Apri Photo Grid Planner</a>
    </main>
    <script>
      const appUrl = "photogridplanner://instagram-auth" + window.location.search + window.location.hash;
      const openAppLink = document.getElementById("open-app");
      openAppLink.href = appUrl;
      window.location.replace(appUrl);
    </script>
  </body>
</html>
